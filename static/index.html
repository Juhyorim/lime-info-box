<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 miniInfobase</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        color: #333;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        font-size: 1.6rem;
        margin-bottom: 24px;
      }

      /* 탭 */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .tab {
        padding: 8px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #ddd;
        font-size: 0.95rem;
      }
      .tab.active {
        background: #4f46e5;
        color: white;
      }

      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* 카드 */
      .card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        margin-bottom: 16px;
      }

      /* 입력 */
      input[type="text"],
      textarea {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.95rem;
        margin-bottom: 10px;
      }
      textarea {
        height: 100px;
        resize: vertical;
      }
      button {
        padding: 10px 20px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
      }
      button:hover {
        background: #4338ca;
      }
      button.danger {
        background: #ef4444;
      }
      button.secondary {
        background: #6b7280;
      }

      /* 채팅 */
      .chat-box {
        height: 420px;
        overflow-y: auto;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bubble {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 12px;
        line-height: 1.6;
      }
      .bubble.user {
        align-self: flex-end;
        background: #4f46e5;
        color: white;
        border-bottom-right-radius: 2px;
      }
      .bubble.ai {
        align-self: flex-start;
        background: white;
        border: 1px solid #e5e7eb;
        border-bottom-left-radius: 2px;
        white-space: pre-wrap;
      }
      .bubble.ai .sources {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #e5e7eb;
        font-size: 0.8rem;
        color: #6b7280;
      }
      .bubble.loading {
        align-self: flex-start;
        background: #f3f4f6;
        color: #9ca3af;
        font-style: italic;
      }

      .chat-input-row {
        display: flex;
        gap: 8px;
      }
      .chat-input-row input {
        margin-bottom: 0;
        flex: 1;
      }

      /* provider 뱃지 */
      .provider-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        margin-left: 8px;
      }
      .provider-badge.gpt {
        background: #d1fae5;
        color: #065f46;
      }
      .provider-badge.claude {
        background: #ede9fe;
        color: #5b21b6;
      }

      /* 출처 */
      .source-item {
        background: #f9fafb;
        border-left: 3px solid #4f46e5;
        padding: 6px 10px;
        margin-top: 4px;
        border-radius: 4px;
        font-size: 0.82rem;
      }

      /* 문서 목록 */
      .doc-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: bold;
        margin-left: 6px;
      }
      .badge.pdf {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge.txt,
      .badge.md {
        background: #dbeafe;
        color: #1e40af;
      }
      .badge.docx {
        background: #d1fae5;
        color: #065f46;
      }

      /* provider 전환 */
      .provider-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
      }
      .provider-row select {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.9rem;
      }

      .status {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-top: 10px;
      }
      .status.success {
        background: #d1fae5;
        color: #065f46;
      }
      .status.error {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>
        📚 miniInfobase
        <span class="provider-badge" id="providerBadge">gpt</span>
      </h1>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('chat')">
          💬 AI 답변
        </button>
        <button class="tab" onclick="switchTab('upload')">📤 업로드</button>
        <button class="tab" onclick="switchTab('docs')">📁 문서 목록</button>
        <button class="tab" onclick="switchTab('settings')">⚙️ 설정</button>
      </div>

      <!-- 💬 AI 답변 탭 -->
      <div id="tab-chat" class="tab-content active">
        <div class="card">
          <div class="chat-box" id="chatBox"></div>
          <div class="chat-input-row">
            <input
              type="text"
              id="chatInput"
              placeholder="문서에 대해 질문하세요..."
              onkeydown="if (event.key === 'Enter') sendAsk();"
            />
            <button onclick="sendAsk()">전송</button>
            <button class="secondary" onclick="clearChat()">초기화</button>
          </div>
        </div>
      </div>

      <!-- 📤 업로드 탭 -->
      <div id="tab-upload" class="tab-content">
        <div class="card">
          <h3 style="margin-bottom: 14px">파일 업로드</h3>
          <input
            type="file"
            id="fileInput"
            accept=".pdf,.txt,.md,.docx"
            style="margin-bottom: 10px"
          />
          <br />
          <button onclick="uploadFile()">업로드</button>
          <div id="uploadStatus"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 14px">텍스트 직접 입력</h3>
          <input
            type="text"
            id="textTitle"
            placeholder="제목 (예: 회의록_240427.txt)"
          />
          <textarea
            id="textContent"
            placeholder="텍스트를 붙여넣으세요..."
          ></textarea>
          <button onclick="uploadText()">저장</button>
          <div id="textStatus"></div>
        </div>
      </div>

      <!-- 📁 문서 목록 탭 -->
      <div id="tab-docs" class="tab-content">
        <div class="card">
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 14px;
            "
          >
            <h3>저장된 문서</h3>
            <button onclick="loadDocs()">새로고침</button>
          </div>
          <div id="docList">로딩 중...</div>
        </div>
      </div>

      <!-- ⚙️ 설정 탭 -->
      <div id="tab-settings" class="tab-content">
        <div class="card">
          <h3 style="margin-bottom: 14px">LLM Provider 전환</h3>
          <div class="provider-row">
            <select id="providerSelect">
              <option value="gpt">GPT (OpenAI)</option>
              <option value="claude">Claude (Anthropic)</option>
            </select>
            <select id="modelSelect">
              <option value="gpt-4o-mini">gpt-4o-mini (저렴)</option>
              <option value="gpt-4o">gpt-4o (고성능)</option>
              <option value="claude-haiku-4-5">claude-haiku (저렴)</option>
              <option value="claude-sonnet-4-5">claude-sonnet (고성능)</option>
            </select>
            <button onclick="changeProvider()">변경</button>
          </div>
          <div id="providerStatus"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 14px">검색 설정</h3>
          <label style="font-size: 0.9rem">참고 청크 수 (top_k)</label>
          <input
            type="text"
            id="topKInput"
            value="3"
            style="width: 80px; margin-left: 10px; margin-bottom: 0"
          />
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:8000";
      let sessionId = "session_" + Date.now();

      // ── 탭 전환 ──────────────────────────────────────────
      function switchTab(name) {
        document
          .querySelectorAll(".tab-content")
          .forEach((el) => el.classList.remove("active"));
        document
          .querySelectorAll(".tab")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById("tab-" + name).classList.add("active");
        event.target.classList.add("active");
        if (name === "docs") loadDocs();
        if (name === "settings") loadProviderStatus();
      }

      // ── AI 답변 ──────────────────────────────────────────
      async function sendAsk() {
        const input = document.getElementById("chatInput");
        const query = input.value.trim();
        if (!query) return;

        appendBubble("user", query);
        input.value = "";

        const loadingEl = appendBubble("loading", "🤔 답변 생성 중...");
        const topK = parseInt(document.getElementById("topKInput").value) || 3;

        try {
          const res = await fetch(`${API}/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, top_k: topK, session_id: sessionId }),
          });
          const data = await res.json();
          loadingEl.remove();

          if (!res.ok) {
            appendBubble("ai", "❌ " + (data.detail || "오류가 발생했습니다."));
            return;
          }

          // 출처 HTML
          const sourcesHtml = data.sources
            .map(
              (s, i) =>
                `<div class="source-item">📄 ${s.filename} | 청크 #${s.chunk_index} | 유사도 ${s.similarity_score}</div>`,
            )
            .join("");

          appendBubbleWithSources(data.answer, sourcesHtml, data.provider);
        } catch (e) {
          loadingEl.remove();
          appendBubble("ai", "❌ 서버 연결 오류");
        }
      }

      function appendBubble(type, text) {
        const box = document.getElementById("chatBox");
        const el = document.createElement("div");
        el.className = `bubble ${type}`;
        el.textContent = text;
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
        return el;
      }

      function appendBubbleWithSources(answer, sourcesHtml, provider) {
        const box = document.getElementById("chatBox");
        const el = document.createElement("div");
        el.className = "bubble ai";
        el.innerHTML = `<div>${answer.replace(/\n/g, "<br>")}</div>
      <div class="sources">
        <b>📎 참고 출처</b>${sourcesHtml}
      </div>`;
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
      }

      async function clearChat() {
        await fetch(`${API}/conversation/${sessionId}`, { method: "DELETE" });
        document.getElementById("chatBox").innerHTML = "";
        sessionId = "session_" + Date.now();
      }

      // ── 업로드 ───────────────────────────────────────────
      async function uploadFile() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) return alert("파일을 선택하세요.");
        const form = new FormData();
        form.append("file", file);
        const statusEl = document.getElementById("uploadStatus");
        statusEl.innerHTML = '<div class="status">⏳ 업로드 중...</div>';
        try {
          const res = await fetch(`${API}/upload`, {
            method: "POST",
            body: form,
          });
          const data = await res.json();
          if (res.ok) {
            statusEl.innerHTML = `<div class="status success">✅ ${data.filename} 저장 완료 (${data.total_chunks}개 청크)</div>`;
          } else {
            statusEl.innerHTML = `<div class="status error">❌ ${data.detail}</div>`;
          }
        } catch (e) {
          statusEl.innerHTML =
            '<div class="status error">❌ 서버 연결 오류</div>';
        }
      }

      async function uploadText() {
        const title = document.getElementById("textTitle").value.trim();
        const content = document.getElementById("textContent").value.trim();
        if (!title || !content) return alert("제목과 내용을 입력하세요.");
        const blob = new Blob([content], { type: "text/plain" });
        const file = new File(
          [blob],
          title.endsWith(".txt") ? title : title + ".txt",
        );
        const form = new FormData();
        form.append("file", file);
        const statusEl = document.getElementById("textStatus");
        statusEl.innerHTML = '<div class="status">⏳ 저장 중...</div>';
        try {
          const res = await fetch(`${API}/upload`, {
            method: "POST",
            body: form,
          });
          const data = await res.json();
          if (res.ok) {
            statusEl.innerHTML = `<div class="status success">✅ 저장 완료 (${data.total_chunks}개 청크)</div>`;
            document.getElementById("textTitle").value = "";
            document.getElementById("textContent").value = "";
          } else {
            statusEl.innerHTML = `<div class="status error">❌ ${data.detail}</div>`;
          }
        } catch (e) {
          statusEl.innerHTML =
            '<div class="status error">❌ 서버 연결 오류</div>';
        }
      }

      // ── 문서 목록 ─────────────────────────────────────────
      async function loadDocs() {
        const res = await fetch(`${API}/documents`);
        const data = await res.json();
        const el = document.getElementById("docList");
        if (!data.documents.length) {
          el.innerHTML = '<p style="color:#9ca3af">저장된 문서가 없습니다.</p>';
          return;
        }
        el.innerHTML =
          `<p style="color:#6b7280; margin-bottom:10px">총 ${data.documents.length}개 문서 / ${data.total_chunks}개 청크</p>` +
          data.documents
            .map(
              (d) => `
        <div class="doc-item">
          <span>${d.filename} <span class="badge ${d.file_type.replace(".", "")}">${d.file_type}</span>
          <span style="color:#9ca3af; font-size:0.8rem"> ${d.chunk_count}청크</span></span>
          <button class="danger" onclick="deleteDoc('${d.doc_id}', this)" style="padding:6px 12px; font-size:0.8rem">삭제</button>
        </div>`,
            )
            .join("");
      }

      async function deleteDoc(docId, btn) {
        if (!confirm("삭제할까요?")) return;
        const res = await fetch(`${API}/documents/${docId}`, {
          method: "DELETE",
        });
        if (res.ok) loadDocs();
      }

      // ── Provider 설정 ─────────────────────────────────────
      async function loadProviderStatus() {
        const res = await fetch(`${API}/settings/provider`);
        const data = await res.json();
        document.getElementById("providerSelect").value = data.provider;
        document.getElementById("modelSelect").value = data.model;
        updateProviderBadge(data.provider);
      }

      async function changeProvider() {
        const provider = document.getElementById("providerSelect").value;
        const model = document.getElementById("modelSelect").value;
        const res = await fetch(`${API}/settings/provider`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ provider, model }),
        });
        const data = await res.json();
        const statusEl = document.getElementById("providerStatus");
        if (res.ok) {
          statusEl.innerHTML = `<div class="status success">✅ ${data.provider} / ${data.model} 로 변경 완료</div>`;
          updateProviderBadge(data.provider);
        } else {
          statusEl.innerHTML = `<div class="status error">❌ ${data.detail}</div>`;
        }
      }

      function updateProviderBadge(provider) {
        const badge = document.getElementById("providerBadge");
        badge.textContent = provider;
        badge.className = `provider-badge ${provider}`;
      }

      // ── 초기화 ────────────────────────────────────────────
      loadProviderStatus();
    </script>
  </body>
</html>
